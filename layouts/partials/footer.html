<footer class="site-footer" role="contentinfo" aria-label="Footer">
  <div class="footer__inner">
    <p class="footer__copyright">© {{ now.Year }} {{ site.Title }}</p>
    {{ with site.Params.rssURL }}
    <p class="footer__rss"><a href="{{ . }}">RSS</a></p>
    {{ end }}
    {{ with site.Params.social }}
    <ul class="footer__social" aria-label="Social links">
      {{ range . }}
      <li><a href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a></li>
      {{ end }}
    </ul>
    {{ end }}
    <span class="footer__credit" aria-label="Theme credit">Powered by Hugo</span>
  </div>
</footer>
