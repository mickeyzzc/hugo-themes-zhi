{{ define "main" }}
<div class="archive-page">
  <header class="archive-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}
    <div class="Content">{{ . }}</div>
    {{ end }}
  </header>
  <div class="archive-list">
    {{ range .Pages.GroupByDate "2006" }}
    <section class="archive-year">
      <h2 class="archive-year__title">{{ .Key }}</h2>
      <ul class="archive-year__posts">
        {{ range .Pages }}
        <li class="archive-post">
          <time class="archive-post__date" datetime="{{ .Date | time.Format "2006-01-02" }}">{{ .Date | time.Format "Jan 02" }}</time>
          <a class="archive-post__link" href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
        {{ end }}
      </ul>
    </section>
    {{ end }}
  </div>
</div>
{{ end }}
