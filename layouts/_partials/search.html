{{ if default true .Site.Params.features.search }}
<div class="search-overlay" id="search-overlay" aria-hidden="true">
  <div class="search-modal">
    <div class="search-input-wrapper">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="search" id="search-input" class="search-input" placeholder="{{ i18n `search_placeholder` | default `Search...` }}" autocomplete="off">
      <button class="search-close" id="search-close" aria-label="{{ i18n `closeSearch` }}">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="search-results" id="search-results"></div>
    <div class="search-footer">
      <kbd>Enter</kbd> to select · <kbd>Esc</kbd> to close
    </div>
  </div>
</div>
{{ end }}
