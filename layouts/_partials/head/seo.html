{{ if default true .Site.Params.seo.openGraph }}
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Site.Title }} - {{ .Title }}{{ end }}" />
<meta property="og:description" content="{{ .Description | default .Site.Params.description }}" />
<meta property="og:image" content="{{ if .Params.images }}{{ index .Params.images 0 }}{{ else }}{{ .Site.Params.seo.image | default .Site.Params.avatar }}{{ end }}" />
<meta property="og:image:width" content="312" />
<meta property="og:image:height" content="312" />
<meta property="og:image:type" content="image/jpeg/png/svg/jpg" />
<meta property="og:url" content="{{ .RelPermalink }}" />
<meta property="og:site_name" content="{{ .Site.Title }}" />
<meta property="og:locale" content="{{ .Site.LanguageCode }}" />
{{ if .IsPage }}
<meta property="article:author" content="{{ .Params.author | default .Site.Params.author }}" />
<meta property="article:published_time" content="{{ .Date }}" />
<meta property="article:modified_time" content="{{ .Lastmod }}" />
{{ end }}
{{ end }}

{{ if default true .Site.Params.seo.twitterCard }}
<meta name="twitter:card" content="{{ .Site.Params.seo.twitterCardType | default "summary_large_image" }}" />
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Site.Title }} - {{ .Title }}{{ end }}" />
<meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}" />
<meta name="twitter:image" content="{{ if .Params.images }}{{ index .Params.images 0 }}{{ else }}{{ .Site.Params.seo.image | default .Site.Params.avatar }}{{ end }}" />
{{ end }}
