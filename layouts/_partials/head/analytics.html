{{ if default false .Site.Params.features.analytics }}
{{ if .Site.Params.analytics.endpoint }}
<script src="{{ .Site.Params.analytics.endpoint }}" data-site-id="{{ .Site.Params.analytics.siteId }}" data-sample-rate="{{ .Site.Params.analytics.sampleRate }}" defer></script>
{{ end }}
{{ with .Site.Params.analytics.cloudflareToken }}
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "{{ . }}"}'></script>
{{ end }}
{{ with .Site.Params.analytics.clarityProjectId }}
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "{{ . }}");
</script>
{{ end }}
{{ end }}
