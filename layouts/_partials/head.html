<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Site.Title }} - {{ .Title }}{{ end }}</title>
<meta name="description" content="{{ .Description | default .Site.Params.description }}">
<meta name="keywords" content="{{ if .Keywords }}{{ delimit .Keywords `, ` }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="alternate" type="application/rss+xml" href="{{ with .OutputFormats.Get `RSS` }}{{ .RelPermalink }}{{ end }}">

{{ partial "head/seo.html" . }}
{{ partial "head/css.html" . }}
{{ partial "head/favicons.html" . }}
{{ partial "head/analytics.html" . }}

<meta name="theme-color" content="{{ with .Site.Params.themeColor }}{{ . }}{{ else }}#ffffff{{ end }}">

{{/* Inline FOUC prevention script */}}
<script>
  (function(){try{var t=localStorage.getItem('theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark')}else if(!t){var h=new Date().getHours();if(h>=18||h<6){document.documentElement.setAttribute('data-theme','dark')}}}catch(e){}})();
</script>
