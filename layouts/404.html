<!doctype html>
<html lang="{{ site.Language.Lang }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <style>
    /* Theme variables */
    :root {
      --bg: #ffffff;
      --text: #222222;
      --text-secondary: #666666;
      --accent: #0066cc;
      --link: #0066cc;
      --link-hover: #004499;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --text: #e0e0e0;
      --text-secondary: #999;
      --accent: #4da6ff;
      --link: #4da6ff;
      --link-hover: #80bfff;
    }

    /* Base styles */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Layout */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    /* 404 heading */
    .error-code {
      font-size: clamp(8rem, 25vw, 16rem);
      font-weight: 700;
      line-height: 1;
      margin: 0 0 1rem;
      color: var(--accent);
      opacity: 0.8;
    }

    /* Message */
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      margin: 0 0 1rem;
      font-weight: 600;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      color: var(--text-secondary);
      margin: 0 0 2rem;
      line-height: 1.6;
    }

    /* Home link */
    .home-link {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: var(--accent);
      color: var(--bg);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: opacity 0.2s, transform 0.2s;
    }

    .home-link:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .home-link:active {
      transform: translateY(0);
    }

    /* Hide script */
    .theme-script {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="/" class="home-link">Go Home</a>
  </div>

  <script class="theme-script">
    (function() {
      'use strict';

      var THEME_KEY = 'theme';
      var DARK_THEME = 'dark';

      function getCurrentTheme() {
        var saved = localStorage.getItem(THEME_KEY);
        if (saved) {
          return saved;
        }
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? DARK_THEME : 'light';
      }

      function applyTheme(theme) {
        var html = document.documentElement;
        if (theme === DARK_THEME) {
          html.setAttribute('data-theme', DARK_THEME);
        } else {
          html.removeAttribute('data-theme');
        }
      }

      function handleStorageChange(e) {
        if (e.key === THEME_KEY) {
          var newTheme = e.newValue || 'light';
          if (!e.newValue) {
            newTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? DARK_THEME : 'light';
          }
          applyTheme(newTheme);
        }
      }

      function handleSystemPreferenceChange(e) {
        if (!localStorage.getItem(THEME_KEY)) {
          var newTheme = e.matches ? DARK_THEME : 'light';
          applyTheme(newTheme);
        }
      }

      function init() {
        var initialTheme = getCurrentTheme();
        applyTheme(initialTheme);

        window.addEventListener('storage', handleStorageChange);

        var mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        if (mediaQuery.addEventListener) {
          mediaQuery.addEventListener('change', handleSystemPreferenceChange);
        } else {
          mediaQuery.addListener(handleSystemPreferenceChange);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
