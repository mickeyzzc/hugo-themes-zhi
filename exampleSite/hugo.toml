# ============================================================================
# Zhi Theme — Configuration Schema
# ============================================================================
#
# This file is both the working config for exampleSite AND the documented
# schema for every param the theme accepts.
#
# ALL parameters are optional. The theme degrades gracefully when params are
# absent — every feature defaults to "off" or a sensible built-in value.
#
# Sections:
#   1. Site Identity       9.  Donation / Sponsor
#   2. Features (toggle)   10. Creative Commons
#   3. Typography           11. Footer
#   4. Sidebar              12. SEO
#   5. Post Meta            13. Analytics
#   6. Table of Contents    14. Social Links (global fallback)
#   7. Reading Progress     15. Video Embed
#   8. Back to Top          16. Friend Links
#
# ============================================================================

baseURL      = 'https://example.org/'
locale       = 'en-US'
title        = 'Zhi Theme Demo'
paginate     = 10
theme        = 'hugo-themes-zhi'

# -- Markup ----------------------------------------------------------------
[markup]
  [markup.highlight]
    codeFences       = true
    noClasses        = false
    lineNumbersInTable = true
    style            = "monokai"
    tabWidth         = 2

# -- Outputs ---------------------------------------------------------------
[outputs]
  home     = ["HTML", "RSS", "SearchIndexes"]
  section  = ["HTML", "RSS"]

[outputFormats.SearchIndexes]
  mediatype     = "application/xml"
  baseName      = "searchindexes"
  isPlainText   = false

# -- Menus -----------------------------------------------------------------
[[menus.main]]
  name     = 'Home'
  pageRef  = '/'
  weight   = 10

[[menus.main]]
  name     = 'Posts'
  pageRef  = '/posts'
  weight   = 20

[[menus.main]]
  name     = 'Archives'
  pageRef  = '/archives'
  weight   = 30

[[menus.main]]
  name     = 'Tags'
  pageRef  = '/tags'
  weight   = 40

[[menus.main]]
  name     = 'About'
  pageRef  = '/about'
  weight   = 50

# ============================================================================
# 1. Site Identity
# ============================================================================
# Used in sidebar header, footer copyright, and SEO meta tags.

[params]
  author      = ""                  # e.g. "张三" — shown in sidebar & meta
  description = ""                  # Short site description — sidebar & SEO
  avatar      = ""                  # Avatar image URL — displayed in sidebar
  since       = 0                   # Site start year (e.g. 2024). 0 = hide "since" line

  # ==========================================================================
  # 2. Features (all toggleable — flip to false to disable)
  # ==========================================================================

  [params.features]
    codeHighlight   = true          # Syntax highlighting via Hugo Chroma
    themeSwitch     = true          # Dark / light toggle button in header
    mathJax         = true          # MathJax 3 — auto-loaded on $...$ detection
    mermaid         = true          # Mermaid diagrams — auto-loaded on ```mermaid blocks
    lightbox        = true          # Click-to-zoom images
    search          = true          # Local search (XML index + search UI)
    sidebar         = true          # Sidebar with avatar + social links
    toc             = true          # Table of contents on post pages
    readingProgress = true          # Thin progress bar at top/bottom of post
    backToTop       = true          # Floating back-to-top button
    analytics       = false         # Custom analytics endpoint

  # ==========================================================================
  # 3. Typography
  # ==========================================================================
  # Override default fonts. Empty string = system font stack.

  [params.typography]
    headingFont  = ""               # e.g. '"Playfair Display", serif'
    bodyFont     = ""               # e.g. '"Source Sans 3", sans-serif'
    codeFont     = ""               # e.g. '"Fira Code", monospace'
    lineScale    = 1.6              # Body line-height
    cjkLineScale = 1.8              # CJK body line-height override

  # ==========================================================================
  # 4. Sidebar
  # ==========================================================================
  # Only rendered when params.features.sidebar = true.

  [params.sidebar]
    position = "left"               # "left" | "right"
    width    = "256px"              # CSS value for sidebar width

    # Social links in sidebar. Each entry requires name + url.
    # Optional: icon — theme has built-in icons for github, twitter/x,
    #           email, rss, linkedin, mastodon. Omit icon for text-only link.
    #
    # [[params.sidebar.socialLinks]]
    #   name = "GitHub"
    #   url  = "https://github.com/yourusername"
    #   icon = "github"
    #
    # [[params.sidebar.socialLinks]]
    #   name = "Email"
    #   url  = "mailto:you@example.com"
    #   icon = "email"

  # ==========================================================================
  # 5. Post Meta
  # ==========================================================================
  # Controls which meta items appear below the post title.

  [params.postMeta]
    date        = true              # Publish date (.Date)
    updatedDate = true              # Last-modified date (.Lastmod)
    categories  = true              # Category taxonomy links
    tags        = true              # Tag taxonomy links
    wordCount   = true              # Total word count
    readingTime = true              # Estimated reading time (minutes)
    views       = false             # Page views — requires busuanzi (see analytics)

  # ==========================================================================
  # 6. Table of Contents
  # ==========================================================================
  # Only rendered when params.features.toc = true AND page has headings.

  [params.toc]
    maxDepth  = 3                   # Heading depth to include (1 = H1, 3 = H3)
    numbering = true                # Prepend counter to each heading in TOC
    collapse  = true                # Collapse sub-levels (H3+) by default

  # ==========================================================================
  # 7. Reading Progress Bar
  # ==========================================================================
  # Only rendered when params.features.readingProgress = true.
  # Only appears on single/post pages, not home or list pages.

  [params.readingProgress]
    position = "top"                # "top" | "bottom"
    color    = ""                   # CSS color. Empty = use --accent
    height   = "3px"               # CSS value for bar height

  # ==========================================================================
  # 8. Back to Top
  # ==========================================================================
  # Only rendered when params.features.backToTop = true.

  [params.backToTop]
    scrollPercent = true            # Show percentage text inside button

  # ==========================================================================
  # 9. Donation / Sponsor
  # ==========================================================================

  [params.donation]
    enable    = false               # Master toggle — show donation section
    comment   = ""                  # Prompt text, e.g. "觉得有用？请我喝杯咖啡"
    wechatPay = ""                  # WeChat Pay QR code image URL
    alipay    = ""                  # Alipay QR code image URL

  # ==========================================================================
  # 10. Creative Commons
  # ==========================================================================

  [params.creativeCommons]
    enable = false                  # Master toggle — show CC license badge
    license = "by-nc-sa"            # "by" | "by-sa" | "by-nc" | "by-nc-sa" | "by-nd" | "by-nc-nd"
    size   = "normal"               # "normal" | "big"

  # ==========================================================================
  # 11. Footer
  # ==========================================================================
  # All sub-items are optional — only rendered if configured.

  [params.footer]
    beian    = ""                   # ICP beian number, e.g. "京ICP备xxxxxxxx号"
    gongan   = ""                   # Public security beian, e.g. "京公网安备xxxxxxxxxxxxxx号"
    poweredBy = true                # Show "Powered by Hugo" credit line
    copyright = ""                  # Custom copyright text. Empty = "© {since}- {year} {author}"

    # Social links in footer (same schema as sidebar.socialLinks).
    # If omitted, footer uses params.social as fallback.
    #
    # [[params.footer.socialLinks]]
    #   name = "GitHub"
    #   url  = "https://github.com/yourusername"
    #   icon = "github"

  # ==========================================================================
  # 12. SEO
  # ==========================================================================

  [params.seo]
    openGraph      = true           # Generate OpenGraph meta tags
    twitterCard    = true           # Generate Twitter Card meta tags
    twitterCardType = "summary_large_image"  # "summary" | "summary_large_image"

  # ==========================================================================
  # 13. Analytics
  # ==========================================================================
  # Custom analytics controlled by params.features.analytics toggle.
  # Busuanzi is independently toggled here.

  [params.analytics]
    provider   = "custom"           # "custom" | other identifier
    endpoint   = ""                 # Custom analytics POST endpoint URL
    siteId     = ""                 # Site identifier for analytics service
    sampleRate = 100                # Sampling rate percentage (1–100)
    busuanzi   = false              # Enable busuanzi page views (https://busuanzi.ibruce.info)
    cloudflareToken   = ""                 # Cloudflare Web Analytics beacon token
    clarityProjectId  = ""                 # Microsoft Clarity project ID

  # ==========================================================================
  # 14. Social Links (global fallback)
  # ==========================================================================
  # Used by footer when params.footer.socialLinks is not set.
  # Used by sidebar when params.sidebar.socialLinks is not set.
  #
  # [[params.social]]
  #   name = "GitHub"
  #   url  = "https://github.com/yourusername"

  # ==========================================================================
  # 15. Video Embed
  # ==========================================================================

  [params.video]
    defaultPlatform = "bilibili"    # "auto" | "bilibili" | "youtube"
    showSwitch      = true          # Show platform toggle button in video player

  # ==========================================================================
  # 16. Friend Links
  # ==========================================================================
  # Displayed on the /flinks/ page via layouts/flinks/single.html.
  #
  # [[params.links]]
  #   name = "Hugo"
  #   url  = "https://gohugo.io"
  #   desc = "The world's fastest framework for building websites"

  # ==========================================================================
  # 17. Theme
  # ==========================================================================

  [params.theme]
    default = "auto"                # "auto" | "light" | "dark"

# -- Minify ---------------------------------------------------------------
[minify]
  minifyOutput = true
  [minify.html]
    keepWhitespace = false
  [minify.css]
  [minify.js]
  [minify.svg]
